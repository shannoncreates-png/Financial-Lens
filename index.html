<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const {
  ResponsiveContainer, AreaChart, Area, LineChart, Line, BarChart, Bar, ComposedChart,
  PieChart, Pie, Cell, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ReferenceLine
} = Recharts;

/* ============================ CONSTANTS ============================ */
const C = {
  bg:'#080C14', card:'#0D1421', border:'#1E2D45', elevated:'#111827',
  accent:'#3B82F6', accent2:'#8B5CF6', accent3:'#06B6D4',
  up:'#10B981', down:'#F43F5E', warn:'#F59E0B',
  tPri:'#F1F5F9', tSec:'#94A3B8', tMut:'#475569', mono:'#E2E8F0',
};
const PIE_COLORS = ['#3B82F6','#8B5CF6','#06B6D4','#10B981','#F59E0B','#F43F5E','#7C3AED','#0EA5E9'];
const MODEL = 'claude-sonnet-4-6';

const AXIS = { stroke: C.tMut, tick:{ fill: C.tSec, fontSize: 12 } };
const GRID = { strokeDasharray:'3 3', stroke: C.border };
const TIP_STYLE = { contentStyle:{ background:C.card, border:'1px solid '+C.border, borderRadius:'8px', color:C.tPri, fontSize:12 }, labelStyle:{ color:C.tSec } };

const METRIC_TOOLTIPS = {
  'P/E (TTM)': 'Price-to-Earnings ratio. How much investors pay per $1 of earnings. Formula: Share Price ÷ Earnings Per Share (TTM).',
  'PEG': 'Price/Earnings-to-Growth. P/E divided by earnings growth rate. Formula: P/E ÷ EPS Growth %.',
  'P/S': 'Price-to-Sales. Market value per $1 of revenue. Formula: Market Cap ÷ Revenue.',
  'P/B': 'Price-to-Book. Market value per $1 of book equity. Formula: Market Cap ÷ Shareholder Equity.',
  'P/FCF': 'Price-to-Free-Cash-Flow. Market value per $1 of free cash flow. Formula: Market Cap ÷ Free Cash Flow.',
  'EV/EBITDA': 'Enterprise Value to EBITDA. Capital-structure-neutral valuation. Formula: EV ÷ EBITDA.',
  'EV/Revenue': 'Enterprise Value to Revenue. Formula: Enterprise Value ÷ Revenue.',
  'EBITDA Margin': 'EBITDA as a percentage of revenue. Formula: EBITDA ÷ Revenue.',
  'Dividend Yield': 'Annual dividend as a percentage of share price. Formula: Annual Dividend ÷ Share Price.',
  'ROE': 'Return on Equity. Net income per $1 of shareholder equity. Formula: Net Income ÷ Shareholder Equity.',
  'ROA': 'Return on Assets. Net income per $1 of total assets. Formula: Net Income ÷ Total Assets.',
  'ROIC': 'Return on Invested Capital. After-tax operating profit per $1 of invested capital.',
  'Interest Coverage': 'How many times operating income covers interest expense. Formula: Operating Income ÷ Interest Expense.',
  'Effective Tax Rate': 'Income tax as a percentage of pre-tax income. Formula: Income Tax Expense ÷ Pre-Tax Income.',
};

/* ============================ FORMAT HELPERS ============================ */
const num = (x) => {
  if (x === null || x === undefined || x === '' || x === 'None' || x === '-') return null;
  const n = typeof x === 'number' ? x : parseFloat(String(x).replace(/[$,%]/g,''));
  return isNaN(n) ? null : n;
};
function fmtAbbr(n, prefix='') {
  n = num(n); if (n === null) return '—';
  const a = Math.abs(n), sign = n < 0 ? '-' : '';
  if (a >= 1e12) return sign+prefix+(a/1e12).toFixed(2)+'T';
  if (a >= 1e9)  return sign+prefix+(a/1e9).toFixed(2)+'B';
  if (a >= 1e6)  return sign+prefix+(a/1e6).toFixed(2)+'M';
  if (a >= 1e3)  return sign+prefix+(a/1e3).toFixed(2)+'K';
  return sign+prefix+a.toFixed(2);
}
const fmt$ = (n) => fmtAbbr(n, '$');
function fmtMoney(n, d=2) { n = num(n); return n === null ? '—' : '$'+n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(n, d=1) { n = num(n); if (n === null) return '—'; return n.toFixed(d)+'%'; }
function fmtRatio(n, d=2) { n = num(n); return n === null ? '—' : n.toFixed(d); }
function fmtInt(n) { n = num(n); return n === null ? '—' : Math.round(n).toLocaleString(); }
function pct100(n, d=1) { n = num(n); if (n===null) return '—'; const v = Math.abs(n) <= 1 ? n*100 : n; return v.toFixed(d)+'%'; }

/* ============================ STORAGE ============================ */
const KEYS = {
  get: () => ({
    anthropic: localStorage.getItem('fl_anthropic') || '',
    alphavantage: localStorage.getItem('fl_av') || '',
    fmp: localStorage.getItem('fl_fmp') || '',
  }),
  set: (k, v) => localStorage.setItem({anthropic:'fl_anthropic', alphavantage:'fl_av', fmp:'fl_fmp'}[k], v),
};

/* ============================ DATA PROXY ============================ */
// When deployed with the bundled serverless proxy (api/proxy.js), the keys live
// server-side and users need nothing. The client auto-detects the proxy at startup
// and routes data calls through it; otherwise it falls back to direct calls using
// keys the user pastes in Settings (useful for local/static hosting).
const PROXY_PATH = '/api/proxy';
let _proxy = undefined; // undefined=unknown, array=available providers, false=none
async function detectProxy() {
  if (_proxy !== undefined) return _proxy;
  try {
    const r = await fetch(PROXY_PATH + '?ping=1', { cache: 'no-store' });
    if (r.ok) { const j = await r.json(); _proxy = Array.isArray(j.providers) ? j.providers : []; }
    else _proxy = false;
  } catch (e) { _proxy = false; }
  return _proxy;
}
const proxyHas = (p) => Array.isArray(_proxy) && _proxy.includes(p);
const proxyActive = () => Array.isArray(_proxy) && _proxy.length > 0;

// GET a data provider (fmp | av | sec) via proxy if available, else direct with a user key.
async function providerFetch(provider, pathWithQuery, userKey) {
  if (proxyHas(provider)) {
    return fetch(PROXY_PATH + '?provider=' + provider + '&path=' + encodeURIComponent(pathWithQuery));
  }
  if (provider === 'sec') {
    return fetch('https://data.sec.gov/' + pathWithQuery.replace(/^\/+/, ''));
  }
  if (!userKey) throw new Error(provider + '_no_access');
  const base = provider === 'fmp' ? 'https://financialmodelingprep.com/' : 'https://www.alphavantage.co/';
  const sep = pathWithQuery.includes('?') ? '&' : '?';
  return fetch(base + pathWithQuery.replace(/^\/+/, '') + sep + 'apikey=' + encodeURIComponent(userKey));
}
async function providerJSON(provider, pathWithQuery, userKey) {
  const r = await providerFetch(provider, pathWithQuery, userKey);
  if (!r.ok) throw new Error(provider + ' ' + r.status);
  return r.json();
}
// Is the company-data layer usable at all? (proxy with fmp/av, or a user key)
function dataAvailable(keys) {
  return proxyHas('fmp') || proxyHas('av') || !!keys.fmp || !!keys.alphavantage;
}
function aiAvailable(keys) { return proxyHas('claude') || !!keys.anthropic; }

/* ============================ CLAUDE ============================ */
async function callClaude(system, userMsg, apiKey, maxTokens=16000) {
  const payload = { model: MODEL, max_tokens: maxTokens, system, messages:[{role:'user', content:userMsg}] };
  let res;
  if (proxyHas('claude')) {
    res = await fetch(PROXY_PATH + '?provider=claude', { method:'POST', headers:{ 'content-type':'application/json' }, body: JSON.stringify(payload) });
  } else {
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'content-type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify(payload),
    });
  }
  if (!res.ok) { const t = await res.text(); throw new Error('Claude API '+res.status+': '+t.slice(0,300)); }
  const j = await res.json();
  return j.content.map(c => c.text || '').join('');
}
function extractJSON(text) {
  let t = (text || '').trim();
  const fence = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) t = fence[1].trim();
  const s = t.indexOf('{'), e = t.lastIndexOf('}');
  if (s >= 0 && e >= 0) t = t.slice(s, e+1);
  return JSON.parse(t);
}

/* ============================ QUERY PARSE ============================ */
const PARSE_SYS = `You are a financial data query parser. Return ONLY this JSON, no preamble or markdown:
{
  "mode": "single | comparison",
  "companies": [
    { "name": "full company name", "ticker": "ticker if known or inferrable, else null", "exchange": "NYSE | NASDAQ | other | unknown" }
  ],
  "queryConfidence": "high | medium | low",
  "clarificationNeeded": true | false,
  "clarificationPrompt": "string if needed, else null"
}`;

function localParse(query) {
  const q = query.trim();
  const m = q.split(/\s+(?:vs\.?|versus|compared? to|against)\s+/i);
  const mk = (s) => {
    s = s.trim();
    const isTicker = /^[A-Za-z.\-]{1,5}$/.test(s) && s === s.toUpperCase();
    return { name: s, ticker: isTicker ? s.toUpperCase() : null, exchange:'unknown' };
  };
  if (m.length === 2) return { mode:'comparison', companies:[mk(m[0]), mk(m[1])], queryConfidence:'medium', clarificationNeeded:false, clarificationPrompt:null };
  return { mode:'single', companies:[mk(q)], queryConfidence:'medium', clarificationNeeded:false, clarificationPrompt:null };
}
async function parseQuery(query, anthropicKey) {
  if (!proxyHas('claude') && !anthropicKey) return localParse(query);
  try {
    const out = await callClaude(PARSE_SYS, 'Query: '+query, anthropicKey, 1024);
    return extractJSON(out);
  } catch (e) {
    console.warn('parse fallback', e);
    return localParse(query);
  }
}

/* ============================ SEC EDGAR ============================ */
let _tickerMap = null;
async function getTickerMap() {
  if (_tickerMap) return _tickerMap;
  const r = await fetch('https://www.sec.gov/files/company_tickers.json');
  if (!r.ok) throw new Error('SEC ticker map unavailable');
  const j = await r.json();
  _tickerMap = {};
  Object.values(j).forEach(row => { _tickerMap[String(row.ticker).toUpperCase()] = { cik: row.cik_str, title: row.title }; });
  return _tickerMap;
}
function pad10(cik) { return String(cik).padStart(10, '0'); }

// Prefer a primary US listing from FMP search results (avoids foreign dual-listings).
function pickUSsymbol(arr) {
  if (!Array.isArray(arr) || !arr.length) return null;
  const us = arr.find(x => ['NASDAQ','NYSE','AMEX','NYSEAMERICAN'].includes(String(x.exchange||'').toUpperCase()) || x.currency === 'USD');
  const pick = us || arr[0];
  return pick && pick.symbol ? pick.symbol.toUpperCase() : null;
}
// Resolve a company name to a ticker via FMP search / AV symbol search (proxy or direct).
async function resolveTicker(name, keys) {
  if (proxyHas('fmp') || keys.fmp) {
    for (const ep of ['stable/search-symbol?query=', 'stable/search-name?query=']) {
      try {
        const j = await providerJSON('fmp', ep+encodeURIComponent(name)+'&limit=20', keys.fmp);
        const sym = pickUSsymbol(j); if (sym) return sym;
      } catch (e) {}
    }
  }
  if (proxyHas('av') || keys.alphavantage) {
    try {
      const j = await providerJSON('av', 'query?function=SYMBOL_SEARCH&keywords='+encodeURIComponent(name), keys.alphavantage);
      const m = j.bestMatches && j.bestMatches[0]; if (m && m['1. symbol']) return m['1. symbol'].toUpperCase();
    } catch (e) {}
  }
  return null;
}

function annualSeries(facts, names, units=['USD']) {
  const ug = (facts.facts && facts.facts['us-gaap']) || {};
  for (const name of names) {
    const concept = ug[name];
    if (!concept || !concept.units) continue;
    let unitKey = units.find(u => concept.units[u]) || Object.keys(concept.units)[0];
    const arr = concept.units[unitKey];
    if (!arr) continue;
    const annual = arr.filter(x => x.form === '10-K' && x.fp === 'FY' && x.fy);
    const byFy = {};
    annual.forEach(x => { if (!byFy[x.fy] || (x.end > byFy[x.fy].end)) byFy[x.fy] = x; });
    const out = Object.values(byFy).sort((a,b) => a.fy - b.fy).slice(-5)
      .map(x => ({ fy: x.fy, end: x.end, val: x.val }));
    if (out.length) return out;
  }
  return [];
}

async function fetchSEC(company, cikHint) {
  const result = { cik:null, meta:null, facts:null, filings:[], error:null };
  try {
    // CIK is resolved upstream from FMP/AV (CORS-safe). The SEC ticker map on
    // www.sec.gov is CORS-blocked in-browser, so it is only a best-effort fallback.
    let cik = cikHint || null;
    if (!cik && company.ticker) {
      try {
        const map = await getTickerMap();
        const tk = company.ticker.toUpperCase();
        if (map[tk]) cik = map[tk].cik;
      } catch (e) { /* CORS-blocked — ignore */ }
    }
    if (!cik) { result.error = 'CIK unresolved (provide an FMP or Alpha Vantage key)'; return result; }
    result.cik = cik;
    const padded = pad10(cik);

    const subRes = await fetch('https://data.sec.gov/submissions/CIK'+padded+'.json');
    if (subRes.ok) {
      const sub = await subRes.json();
      const f = sub.filings && sub.filings.recent;
      const filings = [];
      if (f) {
        for (let i=0; i<f.form.length && filings.length<40; i++) {
          if (['10-K','10-Q','8-K','DEF 14A','S-1'].includes(f.form[i])) {
            const acc = f.accessionNumber[i].replace(/-/g,'');
            filings.push({
              type: f.form[i], date: f.filingDate[i],
              description: f.primaryDocDescription?.[i] || f.form[i],
              url: 'https://www.sec.gov/Archives/edgar/data/'+cik+'/'+acc+'/'+(f.primaryDocument?.[i]||''),
            });
          }
        }
      }
      result.filings = filings.slice(0, 12);
      result.meta = {
        name: sub.name, sic: sub.sic, sicDescription: sub.sicDescription,
        stateOfIncorporation: sub.stateOfIncorporation, fiscalYearEnd: sub.fiscalYearEnd,
        exchanges: sub.exchanges, tickers: sub.tickers, ein: sub.ein,
        website: sub.website || sub.investorWebsite || null,
        addresses: sub.addresses, category: sub.category, cik,
      };
      if (sub.tickers && sub.tickers.length && !company.ticker) company.ticker = sub.tickers[0];
    }
    // NOTE: data.sec.gov/api/xbrl/companyfacts is CORS-blocked in-browser, so
    // standardized XBRL facts cannot be fetched client-side. Financial line items
    // are sourced from FMP instead; SEC supplies metadata, filings, and IR links.
  } catch (e) { result.error = String(e.message || e); }
  return result;
}

/* ============================ ALPHA VANTAGE ============================ */
async function avGet(fn, ticker, key, extra='') {
  const j = await providerJSON('av', 'query?function='+fn+'&symbol='+encodeURIComponent(ticker)+extra, key);
  if (j.Note || j.Information) throw new Error('AV rate limit');
  return j;
}
async function fetchAlphaVantage(ticker, key) {
  const out = { quote:null, overview:null, priceHistory:[], error:null };
  if ((!proxyHas('av') && !key) || !ticker) { out.error = 'av unavailable'; return out; }
  try {
    const [q, ov, ts] = await Promise.allSettled([
      avGet('GLOBAL_QUOTE', ticker, key),
      avGet('OVERVIEW', ticker, key),
      avGet('TIME_SERIES_MONTHLY_ADJUSTED', ticker, key),
    ]);
    if (q.status === 'fulfilled') out.quote = q.value['Global Quote'] || null;
    if (ov.status === 'fulfilled' && ov.value.Symbol) out.overview = ov.value;
    if (ts.status === 'fulfilled') {
      const series = ts.value['Monthly Adjusted Time Series'] || {};
      out.priceHistory = Object.entries(series)
        .map(([date, v]) => ({ date, price: num(v['5. adjusted close']) }))
        .filter(x => x.price !== null)
        .sort((a,b) => a.date.localeCompare(b.date))
        .slice(-60);
    }
  } catch (e) { out.error = String(e.message || e); }
  return out;
}

/* ============================ FMP (stable API) ============================ */
// FMP retired the /api/v3/ endpoints on 2025-08-31; new keys use the /stable/ API
// (query-param style, e.g. stable/profile?symbol=AAPL).
async function fmpGet(path, key) {
  const j = await providerJSON('fmp', 'stable/'+path, key);
  if (j && j['Error Message']) throw new Error(j['Error Message']);
  return j;
}
function fmpPriceHistory(rows) {
  // stable historical-price-eod/light → [{symbol,date,price,volume}] (descending).
  if (!Array.isArray(rows)) return [];
  const byMonth = {};
  rows.forEach(d => { const m = (d.date||'').slice(0,7); if (m && (!byMonth[m] || d.date > byMonth[m].date)) byMonth[m] = d; });
  return Object.keys(byMonth).sort().slice(-60).map(m => ({ date: byMonth[m].date, price: num(byMonth[m].price ?? byMonth[m].adjClose ?? byMonth[m].close) })).filter(x => x.price !== null);
}
async function fetchFMP(ticker, key) {
  const out = { profile:[], quote:[], income:[], balance:[], cashflow:[], ratios:[], keyMetrics:[], earnings:[], estimates:[], segProduct:null, segGeo:null, priceHistory:[], error:null };
  if ((!proxyHas('fmp') && !key) || !ticker) { out.error = 'fmp unavailable'; return out; }
  const tasks = {
    profile: 'profile?symbol='+ticker,
    quote: 'quote?symbol='+ticker,
    income: 'income-statement?symbol='+ticker+'&limit=5',
    balance: 'balance-sheet-statement?symbol='+ticker+'&limit=5',
    cashflow: 'cash-flow-statement?symbol='+ticker+'&limit=5',
    ratios: 'ratios?symbol='+ticker+'&limit=5',
    keyMetrics: 'key-metrics?symbol='+ticker+'&limit=5',
    earnings: 'earnings?symbol='+ticker+'&limit=16',
    estimates: 'analyst-estimates?symbol='+ticker+'&period=quarter&limit=8',
    priceFull: 'historical-price-eod/light?symbol='+ticker,
  };
  const entries = Object.entries(tasks);
  const settled = await Promise.allSettled(entries.map(([_, p]) => fmpGet(p, key)));
  settled.forEach((s, i) => {
    if (s.status !== 'fulfilled') return;
    const k = entries[i][0];
    if (k === 'priceFull') out.priceHistory = fmpPriceHistory(s.value);
    else out[k] = s.value;
  });
  // revenue segmentation (often premium — best effort)
  try { out.segProduct = await fmpGet('revenue-product-segmentation?symbol='+ticker, key); } catch(e){}
  try { out.segGeo = await fmpGet('revenue-geographic-segmentation?symbol='+ticker, key); } catch(e){}
  // core endpoints are the first 7; if every one rejected, FMP is unusable
  if (settled.slice(0,7).every(s => s.status === 'rejected')) out.error = 'FMP unavailable';
  return out;
}

/* ============================ TRANSCRIPT (best effort) ============================ */
async function fetchTranscript(ticker, key) {
  // FMP earnings-call transcript (often premium). Best-effort, fail silent.
  if (!proxyHas('fmp') && !key) return { available:false, text:null, link:'https://www.fool.com/earnings-call-transcripts/?symbol='+ticker };
  try {
    const j = await providerJSON('fmp', 'stable/earning-call-transcript?symbol='+ticker+'&limit=1', key);
    const t = Array.isArray(j) ? j[0] : j;
    if (t && t.content) {
      return { available:true, date:t.date, quarter:'Q'+(t.period||t.quarter||'')+' '+(t.year||''), text:String(t.content).slice(0, 14000) };
    }
  } catch (e) {}
  return { available:false, text:null, link:'https://www.fool.com/earnings-call-transcripts/?symbol='+ticker };
}

/* ============================ FETCH ORCHESTRATION ============================ */
async function fetchCompany(company, keys, onStep) {
  // 1. Resolve ticker (name -> ticker) via CORS-safe search when needed.
  let ticker = (company.ticker || '').toUpperCase();
  const looksLikeTicker = /^[A-Z.\-]{1,5}$/.test(ticker);
  if (!looksLikeTicker) {
    const resolved = await resolveTicker(company.name, keys);
    if (resolved) ticker = resolved;
  }
  company.ticker = ticker;

  // 2. Market + statements (these only need the ticker, and are CORS-friendly).
  onStep && onStep('market', 'run');
  const [av, fmp, transcript] = await Promise.all([
    fetchAlphaVantage(ticker, keys.alphavantage),
    fetchFMP(ticker, keys.fmp),
    fetchTranscript(ticker, keys.fmp),
  ]);
  onStep && onStep('market', av.error ? 'warn' : 'ok');
  onStep && onStep('transcript', transcript.available ? 'ok' : 'warn');
  onStep && onStep('statements', fmp.error ? 'warn' : 'ok');

  // 3. CIK comes from FMP profile / AV overview (data.sec.gov XBRL + ticker map are CORS-blocked).
  const profile = (fmp.profile && fmp.profile[0]) || null;
  const cik = (av.overview && num(av.overview.CIK)) || (profile && num(profile.cik)) || null;

  // 4. SEC submissions (CORS-safe) -> metadata, filings, IR links.
  onStep && onStep('sec', 'run');
  const sec = await fetchSEC(company, cik);
  onStep && onStep('sec', sec.error ? 'warn' : 'ok');

  const raw = {
    query: { name: company.name, ticker, exchange: company.exchange },
    sec: { cik: sec.cik || cik, meta: sec.meta, filings: sec.filings, error: sec.error },
    alphaVantage: { quote: av.quote, overview: av.overview, error: av.error },
    fmp: {
      profile, quote: fmp.quote, income: fmp.income, balance: fmp.balance, cashflow: fmp.cashflow, ratios: fmp.ratios, keyMetrics: fmp.keyMetrics,
      earnings: (fmp.earnings||[]).slice(0,16), estimates: fmp.estimates,
      segProduct: fmp.segProduct, segGeo: fmp.segGeo, error: fmp.error,
    },
    transcript: { available: transcript.available, date: transcript.date, quarter: transcript.quarter, text: transcript.text },
  };
  // strip AV target price field defensively
  if (raw.alphaVantage.overview) delete raw.alphaVantage.overview.AnalystTargetPrice;

  // Price history: prefer Alpha Vantage (adjusted) when present, else FMP EOD.
  const priceHistory = (av.priceHistory && av.priceHistory.length) ? av.priceHistory : (fmp.priceHistory || []);

  onStep && onStep('synthesis', 'run');
  let data;
  if (proxyHas('claude') || keys.anthropic) {
    try {
      data = await synthesize({ companyName: company.name+' ('+ticker+')', raw, priceHistory }, keys.anthropic);
    } catch (e) {
      console.warn('AI synthesis failed, using local mapping', e);
      data = localSynthesize(raw, priceHistory);
    }
  } else {
    data = localSynthesize(raw, priceHistory);
  }
  onStep && onStep('synthesis', 'ok');
  return { data, raw, sec };
}

    keyEvents: (raw.sec.filings||[]).slice(0,12).map(f => ({ date:f.date, eventType: f.type==='8-K'?'filing_8K':f.type==='10-K'?'earnings':'filing_8K', title:f.type+' filed', description:f.description, source:'SEC EDGAR', sourceUrl:f.url, materialityFlag: f.type==='10-K'?'high':f.type==='8-K'?'medium':'low' })),
    recentFilings: (raw.sec.filings||[]).slice(0,10),
    priceHistory: priceHistory || [],
    dataQualityFlags: [ raw.fmp.error?'Financial Modeling Prep data unavailable for this ticker':null, raw.sec.error&&!raw.sec.cik?'SEC filings unavailable (CIK not resolved)':null, 'Figures mapped directly from source APIs (AI synthesis off) — qualitative sections (business summary, risk factors, earnings-call notes) require an Anthropic key' ].filter(Boolean),
    disclaimer: 'This report contains publicly available financial data compiled for informational purposes only. It does not constitute investment advice, a recommendation to buy or sell any security, or a solicitation of any investment. Forward-looking statements and analyst estimates involve risk and uncertainty. Always consult a qualified financial advisor before making investment decisions.',
  };
}
function segToArr(seg) {
  if (!seg || !Array.isArray(seg) || !seg.length) return [];
  const META = new Set(['symbol','date','fiscalYear','period','reportedCurrency','cik']);
  const latest = seg[0];
  // stable API nests the segments under a sub-object (e.g. {data:{...}}); fall back to the row itself
  const nestedKey = Object.keys(latest).find(k => !META.has(k) && latest[k] && typeof latest[k] === 'object');
  const obj = nestedKey ? latest[nestedKey] : latest;
  const entries = Object.entries(obj).filter(([k,v]) => !META.has(k) && typeof v === 'number');
  const total = entries.reduce((s,[,v]) => s + Math.abs(v), 0);
  return entries.map(([k,v]) => ({ segment:k, region:k, revenue:v, percentOfTotal: total? v/total*100:null }))
    .sort((a,b) => b.revenue - a.revenue);
}

/* ============================ DELTA HELPERS ============================ */
function deltaText(a, b, isPct) {
  a = num(a); b = num(b);
  if (a === null || b === null) return '—';
  const d = a - b;
  if (isPct) return (d>=0?'+':'')+d.toFixed(1)+'pp';
  const rel = b !== 0 ? (d/Math.abs(b))*100 : null;
  return (d>=0?'+':'')+fmtAbbr(d)+(rel!==null?' ('+(rel>=0?'+':'')+rel.toFixed(0)+'%)':'');
}

          {p.geographicPresence && <Field label="Geographic presence">{p.geographicPresence}</Field>}
          {p.recentStrategicPriorities && <Field label="Recent strategic priorities (most recent 10-K)">{p.recentStrategicPriorities}</Field>}
          {hasData(p.topRiskFactors) && <Field label="Company-disclosed risk factors (verbatim from 10-K)"><ul style={{ paddingLeft:18, color:C.tSec, fontSize:13, lineHeight:1.6 }}>{p.topRiskFactors.map((r,i)=><li key={i}>{r}</li>)}</ul></Field>}
          <div className="flex flex-wrap gap-x-6 gap-y-1" style={{ fontSize:12, color:C.tMut }}>
            <span>HQ: {p.headquarters||'—'}</span><span>Employees: {fmtInt(p.employees)}</span>
            <span>Fiscal year end: {p.fiscalYearEnd||'—'}</span><span>SIC: {p.sicCode||'—'}</span>
          </div>
          {p.secEdgarUrl && <a href={p.secEdgarUrl} target="_blank" rel="noreferrer" style={{ fontSize:13 }}>View raw 10-K on SEC EDGAR →</a>}
        </div>
      )}
    </Card>
  );
}
function Field({ label, children }) { return <div><div style={{ color:C.tMut, fontSize:11, textTransform:'uppercase', letterSpacing:.5, marginBottom:5 }}>{label}</div><div style={{ color:C.tSec, fontSize:14, lineHeight:1.6 }}>{children}</div></div>; }
function Pill({ children }) { return <span style={{ fontSize:12, padding:'4px 10px', background:C.elevated, border:'1px solid '+C.border, borderRadius:999, color:C.tSec }}>{children}</span>; }

/* ============================ CHART CARD WRAPPER ============================ */
function ChartCard({ title, sub, height=260, source, children, right, empty }) {
  return (
    <Card>
      <SectionTitle sub={sub} right={right}>{title}</SectionTitle>
      {empty ? <Empty>{empty}</Empty> : <div style={{ height }}><ResponsiveContainer width="100%" height="100%">{children}</ResponsiveContainer></div>}
      {source && <Source>{source}</Source>}
    </Card>
  );
}

/* ============================ 7. REVENUE + GROWTH ============================ */
function RevenueGrowthChart({ data }) {

        <Tooltip {...TIP_STYLE} formatter={(v,n)=> n==='YoY %' ? [fmtPct(v),'YoY %'] : [fmt$(v),'Revenue']} />

/* ============================ 8. MARGIN TRENDS ============================ */
function MarginTrendsChart({ data }) {

/* ============================ 9. SEGMENTATION DONUTS ============================ */
function SegmentationDonuts({ data }) {
  const seg = data.revenueSegmentation || {};
  const byP = (seg.byProduct||[]).filter(s => num(s.revenue)!==null && num(s.revenue)>0);
  const byG = (seg.byGeography||[]).filter(s => num(s.revenue)!==null && num(s.revenue)>0);
  const Donut = ({ rows, nameKey }) => {
    if (!hasData(rows)) return <Empty>Segment revenue breakdown not reported in retrieved filings.</Empty>;
    const d = rows.map(r => ({ name: r[nameKey]||r.segment||r.region, value: num(r.revenue) }));
    return (
      <ResponsiveContainer width="100%" height={200}>
        <PieChart>
          <Pie data={d} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={48} outerRadius={78} paddingAngle={2}>
            {d.map((e,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]} stroke={C.card} />)}
          </Pie>
          <Tooltip {...TIP_STYLE} formatter={v=>fmt$(v)} />
          <Legend wrapperStyle={{ color:C.tSec, fontSize:11 }} />
        </PieChart>
      </ResponsiveContainer>
    );
  };
  return (
    <Card>
      <SectionTitle sub={seg.concentrationNote||(seg.asOf?'As of '+seg.asOf:'')}>Revenue Segmentation</SectionTitle>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><div style={{ color:C.tMut, fontSize:12, textAlign:'center', marginBottom:4 }}>By Product / Segment</div><Donut rows={byP} nameKey="segment" /></div>
        <div><div style={{ color:C.tMut, fontSize:12, textAlign:'center', marginBottom:4 }}>By Geography</div><Donut rows={byG} nameKey="region" /></div>
      </div>
      {seg.concentrationNote && <Source>{seg.concentrationNote}</Source>}
    </Card>
  );
}

/* ============================ 10. FCF WATERFALL ============================ */

  return (
    <Card>
      <SectionTitle>Earnings History (last 8 quarters)</SectionTitle>

              <tr key={i}>

/* ============================ 17. BALANCE SHEET COMPOSITION (from raw FMP) ============================ */
function BalanceSheetCompositionChart({ raw }) {
  const bal = ((raw&&raw.fmp&&raw.fmp.balance)||[]).slice(0,3).reverse();
  if (!hasData(bal)) return <ChartCard title="Balance Sheet Composition" height={220} empty="Multi-year balance sheet not available (FMP key required)." />;
  const d = bal.map(b => ({
    year: String(b.calendarYear||(b.date||'').slice(0,4)),
    cash: num(b.cashAndCashEquivalents)||0,
    otherCurrent: Math.max(0,(num(b.totalCurrentAssets)||0)-(num(b.cashAndCashEquivalents)||0)),
    nonCurrent: num(b.totalNonCurrentAssets)||0,
    curLiab: num(b.totalCurrentLiabilities)||0,
    ltDebt: num(b.longTermDebt)||0,
    otherLiab: Math.max(0,(num(b.totalLiabilities)||0)-(num(b.totalCurrentLiabilities)||0)-(num(b.longTermDebt)||0)),
    equity: num(b.totalStockholdersEquity)||0,
  }));
  return (
    <ChartCard title="Balance Sheet Composition" sub="Left stack: assets · Right stack: liabilities + equity" height={240} source="Source: FMP">
      <BarChart data={d}>
        <CartesianGrid {...GRID} />
        <XAxis dataKey="year" {...AXIS} />
        <YAxis {...AXIS} tickFormatter={v=>fmtAbbr(v,'$')} width={56} />
        <Tooltip {...TIP_STYLE} formatter={(v,n)=>[fmt$(v),n]} />
        <Legend wrapperStyle={{ color:C.tSec, fontSize:11 }} />
        <Bar dataKey="cash" stackId="a" name="Cash" fill={C.accent3} />
        <Bar dataKey="otherCurrent" stackId="a" name="Other current" fill={C.accent} />
        <Bar dataKey="nonCurrent" stackId="a" name="Non-current" fill="#1E40AF" />
        <Bar dataKey="curLiab" stackId="b" name="Current liab" fill={C.down} />
        <Bar dataKey="ltDebt" stackId="b" name="LT debt" fill="#F97316" />
        <Bar dataKey="otherLiab" stackId="b" name="Other liab" fill="#7C3AED" />
        <Bar dataKey="equity" stackId="b" name="Equity" fill={C.up} />
      </BarChart>
    </ChartCard>
  );
}

/* ============================ 18. DEBT VS CASH ============================ */
function DebtVsCashChart({ raw, data }) {
  let d = ((raw&&raw.fmp&&raw.fmp.balance)||[]).slice(0,5).reverse().map(b => ({ year:String(b.calendarYear||(b.date||'').slice(0,4)), debt:num(b.totalDebt), cash:num(b.cashAndCashEquivalents) }));
  if (!hasData(d.filter(x=>x.debt!=null||x.cash!=null))) return <ChartCard title="Debt vs Cash Over Time" height={220} empty="Debt/cash history not available." />;
  return (
    <ChartCard title="Debt vs Cash Over Time" sub="When cash area exceeds debt area, the company holds a net cash position." height={220} source="Source: FMP">
      <AreaChart data={d}>
        <CartesianGrid {...GRID} />
        <XAxis dataKey="year" {...AXIS} />
        <YAxis {...AXIS} tickFormatter={v=>fmtAbbr(v,'$')} width={56} />
        <Tooltip {...TIP_STYLE} formatter={(v,n)=>[fmt$(v),n]} />
        <Legend wrapperStyle={{ color:C.tSec, fontSize:12 }} />
        <Area type="monotone" dataKey="debt" name="Total Debt" stroke={C.down} fill={C.down} fillOpacity={0.15} strokeWidth={2} />
        <Area type="monotone" dataKey="cash" name="Cash" stroke={C.up} fill={C.up} fillOpacity={0.15} strokeWidth={2} />
      </AreaChart>

/* ============================ 19. DEBT STRUCTURE ============================ */
function DebtStructureCard({ data }) {
  const dm = data.debtMaturity || {};
  const total = num(dm.totalDebt), st = num(dm.shortTermDebt), lt = num(dm.longTermDebt);
  const nd = data.keyCalculatedMetrics?.netDebt || {};
  const netDebtNeg = num(nd.value)!==null && num(nd.value)<0;
  const stPct = total ? (st||0)/total*100 : null;
  return (
    <Card>
      <SectionTitle>Debt Structure</SectionTitle>
      <div style={{ marginBottom:16 }}>
        <div style={{ color:C.tMut, fontSize:11, marginBottom:6 }}>MATURITY SPLIT</div>
        {total ? (
          <>
            <div style={{ display:'flex', height:24, borderRadius:6, overflow:'hidden', border:'1px solid '+C.border }}>
              <div style={{ width:(stPct||0)+'%', background:C.warn }} title="Short-term" />
              <div style={{ width:(100-(stPct||0))+'%', background:C.accent }} title="Long-term" />
            </div>
            <div className="flex justify-between mt-1" style={{ fontSize:11, color:C.tSec }}>
              <span className="mono">Short-term {fmt$(st)} ({stPct!=null?stPct.toFixed(0):'—'}%)</span>
              <span className="mono">Long-term {fmt$(lt)}</span>
            </div>
            <div style={{ fontSize:11, color:C.tMut, marginTop:6 }}>Short-term debt ({fmt$(st)}) is due within 12 months. Full maturity schedule in 10-K Notes → {data.companyProfile?.secEdgarUrl && <a href={data.companyProfile.secEdgarUrl} target="_blank" rel="noreferrer">SEC EDGAR</a>}</div>
          </>
        ) : <Empty>Debt maturity not available.</Empty>}
      </div>
      <div style={{ background:C.elevated, border:'1px solid '+C.border, borderRadius:8, padding:14, marginBottom:14 }}>
        <div style={{ color:C.tMut, fontSize:11 }}>NET {netDebtNeg?'CASH':'DEBT'}</div>
        <div className="mono glow-metric" style={{ fontSize:24, color: netDebtNeg?C.up:C.tPri, margin:'4px 0' }}>{netDebtNeg?fmt$(Math.abs(num(nd.value))):fmt$(nd.value)}</div>
        <div className="mono" style={{ fontSize:11, color:C.tMut }}>Total Debt {fmt$(nd.totalDebt)} − Cash {fmt$(nd.cash)} = {netDebtNeg?'−':''}{fmt$(Math.abs(num(nd.value)||0))}</div>
      </div>
      {dm.interestExpense!=null && <div style={{ fontSize:12.5, color:C.tSec }}>Interest expense of {fmt$(dm.interestExpense)} in {(dm.asOf||'').slice(0,4)} on total debt of {fmt$(total)} = implied average rate of <span className="mono" style={{color:C.tPri}}>{pct100(dm.impliedAverageInterestRate)}</span></div>}
    </Card>
  );
}

/* ============================ 20. CAPEX & R&D INTENSITY ============================ */
function CapexRdIntensityChart({ data }) {

  const hasRd = d.some(x => x.rd!=null);
  if (!hasData(d.filter(x=>x.capex!=null||x.rd!=null))) return <ChartCard title="CapEx & R&D Intensity" height={220} empty="CapEx/R&D intensity not available." />;
  return (
    <ChartCard title="CapEx & R&D Intensity (% of revenue)" sub={hasRd?'CapEx = reinvestment in physical assets · R&D = investment in future products':'R&D not reported separately'} height={220} source="Source: SEC / FMP">
      <LineChart data={d}>
        <CartesianGrid {...GRID} />
        <XAxis dataKey="year" {...AXIS} />
        <YAxis {...AXIS} tickFormatter={v=>v+'%'} width={44} />

}

/* ============================ 22. RETURN METRICS RADAR ============================ */
function ReturnMetricsRadar({ data, second }) {
  const rm = data.returnMetrics||{}, prof=(data.profitabilityHistory||[]).slice(-1)[0]||{};
  const build = (r, p) => ([
    { axis:'ROE', v: Math.max(0, num(r.roe)||0) },
    { axis:'ROA', v: Math.max(0, num(r.roa)||0) },
    { axis:'ROIC', v: Math.max(0, num(r.roic)||0) },
    { axis:'Gross M', v: Math.max(0, num(p.grossMargin)||0) },
    { axis:'Op M', v: Math.max(0, num(p.operatingMargin)||0) },
    { axis:'Net M', v: Math.max(0, num(p.netMargin)||0) },
  ]);
  const a = build(rm, prof);
  const d = a.map((row,i) => ({ axis:row.axis, A:row.v, B: second ? build(second.returnMetrics||{}, (second.profitabilityHistory||[]).slice(-1)[0]||{})[i].v : null }));
  return (
    <ChartCard title="Return & Margin Profile" sub="Values shown as raw percentages for visual comparison. See cards for exact figures." height={280}>
      <RadarChart data={d} outerRadius="72%">
        <PolarGrid stroke={C.border} />
        <PolarAngleAxis dataKey="axis" tick={{ fill:C.tSec, fontSize:11 }} />
        <PolarRadiusAxis tick={{ fill:C.tMut, fontSize:9 }} stroke={C.border} />
        <Radar name={data.companyProfile?.ticker||'Company'} dataKey="A" stroke={C.accent} fill={C.accent} fillOpacity={0.2} />
        {second && <Radar name={second.companyProfile?.ticker||'B'} dataKey="B" stroke={C.accent2} fill={C.accent2} fillOpacity={0.2} />}
        <Tooltip {...TIP_STYLE} formatter={v=>fmtPct(v)} />
        <Legend wrapperStyle={{ color:C.tSec, fontSize:12 }} />
      </RadarChart>
    </ChartCard>
  );
}

  const filtered = events.filter(groups[filter]);

    ['Revenue (latest)', lastRev(da), lastRev(db), false, fmt$],
    ['Net Margin %', lastNetMargin(da), lastNetMargin(db), true, pct100],
    ['Revenue CAGR 5yr %', da.keyCalculatedMetrics?.revenueCAGR5yr?.value, db.keyCalculatedMetrics?.revenueCAGR5yr?.value, true, pct100],
    ['P/E (TTM)', da.valuationMetrics?.peRatioTTM, db.valuationMetrics?.peRatioTTM, false, fmtRatio],
    ['ROE %', da.returnMetrics?.roe, db.returnMetrics?.roe, true, pct100],

  const fyA = da.companyProfile?.fiscalYearEnd, fyB = db.companyProfile?.fiscalYearEnd;
  const summary = buildComparisonSummary(da, db);

  // overlay price (% normalized)
  const priceData = buildPriceOverlay(da.priceHistory, db.priceHistory, normalize, ta, tb);
  const revData = mergeByYear(da.revenueHistory, db.revenueHistory, 'revenue', ta, tb);

  const th = { textAlign:'left', color:C.tMut, fontSize:11, fontWeight:500, padding:'10px', borderBottom:'1px solid '+C.border, textTransform:'uppercase' };
  const td = { padding:'10px', fontSize:14, borderBottom:'1px solid '+C.border };

  if (view === 'A') return <BackWrap onBack={()=>setView('compare')} label={'← Back to comparison'}><Dashboard result={A} /></BackWrap>;
  if (view === 'B') return <BackWrap onBack={()=>setView('compare')} label={'← Back to comparison'}><Dashboard result={B} /></BackWrap>;

  return (
    <div className="fade-in" style={{ display:'grid', gap:16 }}>

            <div style={{ color:C.tSec, fontSize:13, marginTop:4 }}>Mkt Cap <span className="mono">{fmt$(d.currentMarketData?.marketCap)}</span></div>

        ))}
      </div>

      {(fyA && fyB && fyA !== fyB) && <div style={{ background:'rgba(245,158,11,0.08)', border:'1px solid '+C.warn+'55', borderRadius:10, padding:'10px 14px', fontSize:13, color:C.warn }}>Note: {ta}'s fiscal year ends {fyA}; {tb}'s ends {fyB}. Annual figures may not cover identical calendar periods.</div>}

      <Card>
        <SectionTitle sub="Δ is purely mathematical — no judgment on which is preferable.">Metric Comparison</SectionTitle>
        <table>
          <thead><tr><th style={th}>Metric</th><th style={th}>{ta}</th><th style={th}>{tb}</th><th style={th}>Δ</th></tr></thead>
          <tbody>{rows.map(([label,a,b,isPct,fmt],i)=>(
            <tr key={i}>
              <td style={{...td,color:C.tSec}}>{label}</td>
              <td style={td} className="mono">{isPct?fmt(a):fmt(a)}</td>
              <td style={td} className="mono">{isPct?fmt(b):fmt(b)}</td>
              <td style={{...td,color:C.tPri}} className="mono">{deltaText(isPct?(Math.abs(num(a))<=1?num(a)*100:num(a)):a, isPct?(Math.abs(num(b))<=1?num(b)*100:num(b)):b, isPct)}</td>

        <div style={{ height:300 }}>
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={priceData}>
              <CartesianGrid {...GRID} />

            <CartesianGrid {...GRID} /><XAxis dataKey="year" {...AXIS} /><YAxis {...AXIS} tickFormatter={v=>v+'%'} width={44} />

      </div>
      <Disclaimer data={da} />
    </div>
  );
}
function BackWrap({ onBack, label, children }) { return <div><button onClick={onBack} style={{ background:'none', border:'none', color:C.accent3, cursor:'pointer', marginBottom:12, fontSize:14 }}>{label}</button>{children}</div>; }
function lastRev(d){ const h=d.revenueHistory||[]; return h.length?num(h[h.length-1].revenue):null; }
function lastNetMargin(d){ const h=d.profitabilityHistory||[]; return h.length?num(h[h.length-1].netMargin):null; }
function buildPriceOverlay(ah, bh, normalize, ta, tb) {
  ah=ah||[]; bh=bh||[];
  const mapA={}, mapB={};
  ah.forEach(p=>mapA[p.date.slice(0,7)]=p.price); bh.forEach(p=>mapB[p.date.slice(0,7)]=p.price);
  const dates=[...new Set([...Object.keys(mapA),...Object.keys(mapB)])].sort();
  const a0=ah[0]?.price, b0=bh[0]?.price;
  return dates.map(d=>({ date:d, a: mapA[d]!=null?(normalize&&a0?(mapA[d]-a0)/a0*100:mapA[d]):null, b: mapB[d]!=null?(normalize&&b0?(mapB[d]-b0)/b0*100:mapB[d]):null }));
}
function mergeByYear(ah, bh, key, ta, tb) {
  ah=ah||[]; bh=bh||[];
  const mapA={}, mapB={};
  ah.forEach(r=>mapA[r.year]=num(r[key])); bh.forEach(r=>mapB[r.year]=num(r[key]));
  const years=[...new Set([...Object.keys(mapA),...Object.keys(mapB)])].sort();
  return years.map(y=>({ year:y, a:mapA[y]!=null?(key==='netMargin'&&Math.abs(mapA[y])<=1?mapA[y]*100:mapA[y]):null, b:mapB[y]!=null?(key==='netMargin'&&Math.abs(mapB[y])<=1?mapB[y]*100:mapB[y]):null }));
}
function buildComparisonSummary(da, db) {
  const ta=da.companyProfile?.legalName||'Company A', tb=db.companyProfile?.legalName||'Company B';
  const cagrA=pct100(da.keyCalculatedMetrics?.revenueCAGR5yr?.value), cagrB=pct100(db.keyCalculatedMetrics?.revenueCAGR5yr?.value);
  const ltA=fmt$(da.balanceSheetSnapshot?.longTermDebt), ltB=fmt$(db.balanceSheetSnapshot?.longTermDebt);
  const nmA=avgNetMargin(da), nmB=avgNetMargin(db);
  return 'Over the available fiscal history, '+ta+' grew revenue at a 5-year CAGR of '+cagrA+' versus '+tb+'’s '+cagrB+'. '
    +ta+' carries '+ltA+' in long-term debt versus '+tb+'’s '+ltB+'. '
    +'Net margins averaged '+nmA+' versus '+nmB+' respectively. All figures are drawn directly from SEC filings, Alpha Vantage, and Financial Modeling Prep; no judgment is expressed about which company represents a preferable investment.';
}
function avgNetMargin(d){ const h=(d.profitabilityHistory||[]).map(r=>num(r.netMargin)).filter(x=>x!=null); if(!h.length) return '—'; const v=h.reduce((s,x)=>s+x,0)/h.length; return pct100(v); }

  const [mode, setMode] = useState('single');
  const [error, setError] = useState(null);
  const [clarify, setClarify] = useState(null);
  const [proxyReady, setProxyReady] = useState(false); // re-render once proxy capability is known

  useEffect(() => { detectProxy().then(() => setProxyReady(true)); }, []);

  const setStep = (k, s) => setSteps(prev => ({ ...prev, [k]: s }));

  const runSearch = useCallback(async (query, forceMode) => {
    setError(null); setClarify(null); setResults(null); setBusy(true); setSteps({}); setParseDetail('');
    try {
      await detectProxy();
      if (!dataAvailable(keys)) {
        setError("No data backend is configured for this deployment yet. Either deploy with the included serverless proxy (then everyone uses it key-free), or paste a free Financial Modeling Prep key in Settings to use it locally.");
        setBusy(false); return;
      }
      setStep('parse', 'run');
      const parsed = await parseQuery(query, keys.anthropic);
      let companies = parsed.companies || [];
      let m = forceMode || parsed.mode || 'single';
      if (m === 'single') companies = companies.slice(0,1);
      setParseDetail(companies.map(c=>c.name).join(' vs '));
      setStep('parse', 'ok');

      if (parsed.clarificationNeeded && !forceMode && companies.length === 2) {
        setClarify({ prompt: parsed.clarificationPrompt || 'Did you mean to compare these two companies?', query });
        setBusy(false); return;
      }
      if (!companies.length) throw new Error('NOTFOUND');

      const out = [];
      for (const c of companies) {
        const r = await fetchCompany(c, keys, setStep);
        if (r.sec && r.sec.error === 'CIK not found' && !r.data.currentMarketData?.price) {
          // likely private / not found
        }
        out.push(r);
      }
      // detect not found / private
      const anyData = out.some(r => r.data.companyProfile?.legalName || r.data.currentMarketData?.price);
      if (!anyData) throw new Error('NOTFOUND');

      setMode(m === 'comparison' && out.length === 2 ? 'comparison' : 'single');
      setResults(out);
    } catch (e) {
      console.error(e);
      const msg = String(e.message||e);
      if (msg.includes('NOTFOUND')) setError("We couldn't find a public company matching that name. Try the stock ticker directly (e.g. AAPL, MSFT).");
      else if (msg.includes('Claude API 401') || msg.includes('authentication')) setError('Anthropic API key rejected. Check your key in Settings.');
      else setError('Something went wrong: '+msg);
    } finally {
      setBusy(false);
    }
  }, [keys]);

  const backendReady = proxyActive();
  const needsSetup = proxyReady && !dataAvailable(keys);

  return (
    <div style={{ minHeight:'100vh', maxWidth:1280, margin:'0 auto', padding:'24px 20px 80px' }}>
      <SettingsPanel open={settingsOpen} onClose={()=>setSettingsOpen(false)} keys={keys} setKeys={setKeys} />
      {/* top bar */}
      <div className="flex items-center justify-between mb-6">
        <div className="flex items-center gap-3 cursor-pointer" onClick={()=>{ setResults(null); setError(null); }}>
          <div style={{ width:34, height:34, borderRadius:9, background:'linear-gradient(135deg,'+C.accent+','+C.accent2+')', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:13, boxShadow:'0 0 16px rgba(59,130,246,.4)' }}>FL</div>
          <div>
            <div style={{ fontWeight:700, fontSize:18, letterSpacing:-0.3 }}>Financial Lens</div>
            <div style={{ fontSize:11, color:C.tMut }}>Verified financial data — sourced, organized, no opinion</div>
          </div>
        </div>
        <button onClick={()=>setSettingsOpen(true)} style={{ background:C.card, border:'1px solid '+C.border, borderRadius:10, width:40, height:40, color:C.tSec, cursor:'pointer', fontSize:18 }} title="Settings">⚙</button>
      </div>

      <div style={{ maxWidth: results||busy ? '100%' : 720, margin: results||busy?'0':'8vh auto 0' }}>
        {!results && !busy && (
          <div className="text-center mb-6 fade-in">
            <h1 style={{ fontSize:34, fontWeight:700, letterSpacing:-0.5 }}>Search any public company.</h1>
            <p style={{ color:C.tSec, fontSize:15, marginTop:8 }}>Live financial data from SEC EDGAR, Alpha Vantage & Financial Modeling Prep — synthesized, sourced, and presented without opinion.</p>
            {backendReady && <p style={{ color:C.up, fontSize:12.5, marginTop:8 }}>● Data backend connected — no API key needed.</p>}
          </div>
        )}
        <SearchBar onSearch={(q)=>runSearch(q)} busy={busy} />
        {!results && !busy && (
          <div className="flex flex-wrap gap-2 mt-3 justify-center">
            {['Apple','NVDA','Apple vs Microsoft','Berkshire Hathaway','Rivian','ACAD'].map(s=>
              <button key={s} className="pill" onClick={()=>runSearch(s)}>{s}</button>)}
          </div>
        )}
        {needsSetup && !results && !busy && (
          <div style={{ background:'rgba(245,158,11,0.08)', border:'1px solid '+C.warn+'55', borderRadius:10, padding:'12px 16px', fontSize:13, color:C.warn, marginTop:16 }}>
            No data backend detected. Deploy this app with the bundled <span className="mono">/api/proxy</span> (so users need no keys), or add a free Financial Modeling Prep key in <button onClick={()=>setSettingsOpen(true)} style={{color:C.warn,background:'none',border:'none',cursor:'pointer',padding:0,textDecoration:'underline'}}>Settings</button> to use it locally.
          </div>
        )}
      </div>

      {clarify && (
        <Card variant="elevated" style={{ maxWidth:520, margin:'24px auto' }}>
          <div style={{ fontSize:15, marginBottom:14 }}>{clarify.prompt}</div>
          <div className="flex gap-3">
            <button onClick={()=>runSearch(clarify.query,'comparison')} style={{ background:C.accent, color:'#fff', border:'none', borderRadius:8, padding:'8px 20px', cursor:'pointer' }}>Yes, compare</button>
            <button onClick={()=>runSearch(clarify.query,'single')} style={{ background:C.elevated, color:C.tPri, border:'1px solid '+C.border, borderRadius:8, padding:'8px 20px', cursor:'pointer' }}>No, single company</button>
          </div>
        </Card>
      )}

      {busy && <LoadingState steps={steps} detail={parseDetail} />}

      {error && !busy && (
        <Card style={{ maxWidth:560, margin:'32px auto', borderColor:C.warn+'55' }}>
          <div style={{ color:C.warn, fontSize:14, lineHeight:1.6 }}>{error}</div>
        </Card>
      )}

      {results && !busy && (
        <div style={{ marginTop:20 }}>
          {mode === 'comparison' ? <ComparisonLayout results={results} /> : <Dashboard result={results[0]} onCompare={()=>{ setResults(null); }} />}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
